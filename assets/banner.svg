<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-label="Growth Hacker Skills by Mamdouh Aboammar">
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#16301F" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="83%" cy="45%" r="48%">
      <stop offset="0%" stop-color="#D7FF4B" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#07110B" stop-opacity="0"/>
    </radialGradient>
    <style>
      .title { font: 750 68px 'Space Grotesk', 'Helvetica Neue', Arial, sans-serif; fill: #F7F8F2; letter-spacing: -2px; }
      .sub { font: 500 24px 'Inter', 'Helvetica Neue', Arial, sans-serif; fill: #B8C6BA; letter-spacing: -0.2px; }
      .meta { font: 650 17px 'IBM Plex Mono', 'SFMono-Regular', monospace; fill: #D7FF4B; letter-spacing: 1.5px; }
      .chip { font: 650 16px 'Inter', 'Helvetica Neue', Arial, sans-serif; fill: #07110B; }
      .node { font: 600 13px 'IBM Plex Mono', 'SFMono-Regular', monospace; fill: #F7F8F2; }
    </style>
  </defs>

  <rect width="1280" height="360" fill="#07110B"/>
  <rect width="1280" height="360" fill="url(#grid)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>

  <g transform="translate(64, 72)">
    <text class="meta" x="0" y="0">AGENT SKILL NETWORK · BY MAMDOUH ABOAMMAR</text>
    <text class="title" x="0" y="82">Growth Hacker Skills</text>
    <text class="sub" x="0" y="128">Research → Voice → Content → Editorial Visuals → Motion → Performance</text>
  </g>

  <g transform="translate(64, 274)">
    <g>
      <rect x="0" y="0" width="110" height="38" rx="19" fill="#D7FF4B"/>
      <text class="chip" x="55" y="25" text-anchor="middle">Research</text>
    </g>
    <g transform="translate(122, 0)">
      <rect x="0" y="0" width="88" height="38" rx="19" fill="#F3C969"/>
      <text class="chip" x="44" y="25" text-anchor="middle">Voice</text>
    </g>
    <g transform="translate(222, 0)">
      <rect x="0" y="0" width="102" height="38" rx="19" fill="#FF8A68"/>
      <text class="chip" x="51" y="25" text-anchor="middle">Content</text>
    </g>
    <g transform="translate(336, 0)">
      <rect x="0" y="0" width="104" height="38" rx="19" fill="#8BE0C1"/>
      <text class="chip" x="52" y="25" text-anchor="middle">Visuals</text>
    </g>
    <g transform="translate(452, 0)">
      <rect x="0" y="0" width="96" height="38" rx="19" fill="#A7B8FF"/>
      <text class="chip" x="48" y="25" text-anchor="middle">Motion</text>
    </g>
    <g transform="translate(560, 0)">
      <rect x="0" y="0" width="112" height="38" rx="19" fill="#F7F8F2"/>
      <text class="chip" x="56" y="25" text-anchor="middle">Analytics</text>
    </g>
  </g>

  <g transform="translate(918, 54)">
    <path d="M122 84 L58 44 M122 84 L42 118 M122 84 L204 42 M122 84 L220 116 M122 84 L124 196 M58 44 L42 118 M204 42 L220 116 M42 118 L124 196 M220 116 L124 196" fill="none" stroke="#365A3F" stroke-width="2"/>

    <circle cx="122" cy="84" r="43" fill="#D7FF4B"/>
    <circle cx="58" cy="44" r="26" fill="#173520" stroke="#8BE0C1" stroke-width="2"/>
    <circle cx="42" cy="118" r="26" fill="#173520" stroke="#F3C969" stroke-width="2"/>
    <circle cx="204" cy="42" r="26" fill="#173520" stroke="#FF8A68" stroke-width="2"/>
    <circle cx="220" cy="116" r="26" fill="#173520" stroke="#A7B8FF" stroke-width="2"/>
    <circle cx="124" cy="196" r="29" fill="#173520" stroke="#F7F8F2" stroke-width="2"/>

    <text class="node" x="122" y="80" text-anchor="middle" fill="#07110B">MAIN</text>
    <text class="node" x="122" y="97" text-anchor="middle" fill="#07110B">ROUTER</text>
    <text class="node" x="58" y="48" text-anchor="middle">R</text>
    <text class="node" x="42" y="122" text-anchor="middle">V</text>
    <text class="node" x="204" y="46" text-anchor="middle">C</text>
    <text class="node" x="220" y="120" text-anchor="middle">D</text>
    <text class="node" x="124" y="200" text-anchor="middle">QA</text>

    <text class="meta" x="124" y="258" text-anchor="middle">NEURAL LINK PROTOCOL</text>
  </g>
</svg>
